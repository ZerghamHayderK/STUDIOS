<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayut Studios | Interactive Project Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #37b36f;
            --bg-dark: #050505;
            --panel-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- BACKGROUND EFFECTS --- */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: glisten var(--duration) infinite ease-in-out; }
        @keyframes glisten { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.2); } }

        /* --- SIDEBAR VARIABLES --- */
        .sidebar {
            width: 280px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .section-title { color: var(--primary-green); font-size: 0.8rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 8px; height: 8px; background: var(--primary-green); border-radius: 50%; display: inline-block; }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.7rem; opacity: 0.6; font-weight: 700; }
        input, select { background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: white; padding: 12px; border-radius: 8px; font-family: inherit; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; gap: 30px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; }
        .logo-text { font-size: 2rem; font-weight: 900; color: var(--primary-green); margin: 0; }
        .btn-download { background: var(--primary-green); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(55, 179, 111, 0.4); }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .card { background: var(--panel-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 15px; padding: 25px; }

        .builder-row { display: grid; grid-template-columns: 1fr 1fr 100px 150px; gap: 15px; align-items: flex-end; }
        .btn-add { background: var(--primary-green); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }

        /* --- CURRENCY TOGGLE --- */
        .currency-switch { display: flex; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 10px; gap: 5px; align-self: flex-end; }
        .cur-btn { border: none; background: transparent; color: white; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 900; transition: 0.2s; }
        .cur-btn.active { background: var(--primary-green); color: black; }

        /* --- QUOTE SUMMARY --- */
        .summary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .item-list { display: flex; flex-direction: column; gap: 10px; }
        .quote-item { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 15px 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .item-main h4 { margin: 0; font-size: 1rem; }
        .item-main p { margin: 5px 0 0; font-size: 0.7rem; opacity: 0.5; }
        .item-price { font-weight: 900; font-family: 'Inter', sans-serif; font-size: 1.1rem; }
        .btn-remove { background: #ff4b4b; color: white; border: none; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: 20px; }

        /* --- PRINT INVOICE --- */
        #invoice-print-area { display: none; }
        @media print {
            body * { display: none !important; }
            #invoice-print-area { display: block !important; background: white !important; color: black !important; padding: 40px; }
            table { width: 100%; border-collapse: collapse; margin-top: 30px; }
            th { text-align: left; background: #f0f0f0; padding: 12px; font-size: 10px; border-bottom: 2px solid var(--primary-green); }
            td { padding: 12px; border-bottom: 1px solid #eee; font-size: 11px; }
            .print-total { margin-top: 30px; text-align: right; font-weight: 900; border-top: 2px solid black; padding-top: 15px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="stars" id="starField"></div>

    <aside class="sidebar">
        <div class="input-group">
            <div class="section-title">Variables</div>
            <p style="font-size: 0.6rem; opacity: 0.5; margin: 0;">Adjust margin, discount & rates</p>
        </div>

        <div class="input-group">
            <label>MARGIN (%)</label>
            <input type="number" id="marginInput" value="7" step="0.5">
        </div>

        <div class="input-group">
            <label>DISCOUNT (%)</label>
            <input type="number" id="discountInput" value="0" step="0.5">
        </div>

        <div style="margin-top: auto;">
            <div class="section-title">System Sync</div>
            <p id="syncStatus" style="font-size: 0.6rem; opacity: 0.5;">Sheet Connection Active</p>
        </div>
    </aside>

    <main class="main-content">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="./wlogo.png" style="height: 40px;" onerror="this.style.display='none'">
                <h1 class="logo-text">Bayut Studios</h1>
            </div>
            <button class="btn-download" onclick="window.print()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download Quote as PDF
            </button>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <div class="section-title" style="margin-bottom: 20px;">Quote Builder</div>
                <div class="builder-row">
                    <div class="input-group">
                        <label>CATEGORY</label>
                        <select id="catSelect" onchange="updateProducts()"><option>Select category...</option></select>
                    </div>
                    <div class="input-group">
                        <label>PRODUCT</label>
                        <select id="prodSelect"><option>Select product...</option></select>
                    </div>
                    <div class="input-group">
                        <label>UNITS</label>
                        <input type="number" id="unitInput" value="1" min="1">
                    </div>
                    <button class="btn-add" onclick="addToQuote()">Add to Quote</button>
                </div>
            </div>

            <div class="card">
                <div class="summary-header">
                    <div class="section-title">Quote Summary</div>
                    <div class="currency-switch">
                        <button class="cur-btn active" onclick="switchCurrency('PKR', this)">PKR</button>
                        <button class="cur-btn" onclick="switchCurrency('USD', this)">USD</button>
                        <button class="cur-btn" onclick="switchCurrency('SAR', this)">SAR</button>
                        <button class="cur-btn" onclick="switchCurrency('AED', this)">AED</button>
                    </div>
                </div>

                <div id="cartList" class="item-list">
                    <p style="opacity: 0.3; text-align: center; padding: 40px;">No items yet. Use the Quote Builder above to add products.</p>
                </div>
            </div>
        </div>
    </main>

    <div id="invoice-print-area">
        <h1 style="color: #37b36f;">Bayut Studios | Official Quote</h1>
        <p id="inv-date"></p>
        <table>
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Qty</th>
                    <th>PKR Total</th>
                    <th>USD Total</th>
                    <th>SAR Total</th>
                    <th>AED Total</th>
                </tr>
            </thead>
            <tbody id="print-rows"></tbody>
        </table>
        <div class="print-total" id="print-grand-totals"></div>
    </div>

    <script>
        const SHEET_ID = '1qvBKlYH7q4dXsu7tEh9OLnKSydfONNRzGa-xjUYLB0g';
        const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        let db = [];
        let cart = [];
        let activeCurrency = 'PKR';

        function clean(v) {
            if (!v) return 0;
            const cleaned = String(v.f || v.v).replace(/[^0-9.]/g, '');
            return parseFloat(cleaned) || 0;
        }

        fetch(DATA_URL).then(r => r.text()).then(t => {
            const j = JSON.parse(t.substr(47).slice(0, -2));
            db = j.table.rows.map(r => {
                const c = r.c;
                return c[0] && c[1] ? { 
                    cat: c[0].v, 
                    name: c[1].v, 
                    bQty: clean(c[2]) || 1, 
                    pkr: clean(c[4]), 
                    usd: clean(c[5]), // Column F in your sheet
                    sar: clean(c[6]), 
                    aed: clean(c[7]) 
                } : null;
            }).filter(x => x);
            
            const cats = [...new Set(db.map(i => i.cat))];
            const sel = document.getElementById('catSelect');
            sel.innerHTML = '<option value="">Select category...</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
        });

        function updateProducts() {
            const cat = document.getElementById('catSelect').value;
            const sel = document.getElementById('prodSelect');
            sel.innerHTML = db.filter(i => i.cat === cat).map(i => `<option value="${i.name}">${i.name}</option>`).join('');
        }

        function switchCurrency(code, btn) {
            activeCurrency = code;
            document.querySelectorAll('.cur-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function addToQuote() {
            const name = document.getElementById('prodSelect').value;
            const qty = parseInt(document.getElementById('unitInput').value) || 1;
            const margin = parseFloat(document.getElementById('marginInput').value) || 0;
            const discount = parseFloat(document.getElementById('discountInput').value) || 0;
            const item = db.find(i => i.name === name);
            
            if(item) {
                // Adjust margin against baked 7% and then apply discount
                const multiplier = ((1 + (margin / 100)) / 1.07) * (1 - (discount / 100));
                
                cart.push({
                    name: item.name,
                    qty,
                    pkr: (item.pkr / item.bQty) * multiplier * qty,
                    usd: (item.usd / item.bQty) * multiplier * qty,
                    sar: (item.sar / item.bQty) * multiplier * qty,
                    aed: (item.aed / item.bQty) * multiplier * qty
                });
                render();
            }
        }

        function render() {
            const list = document.getElementById('cartList');
            const printBody = document.getElementById('print-rows');
            if (cart.length === 0) {
                list.innerHTML = '<p style="opacity: 0.3; text-align: center; padding: 40px;">No items yet.</p>';
                return;
            }

            list.innerHTML = ''; printBody.innerHTML = '';
            let totals = { PKR: 0, USD: 0, SAR: 0, AED: 0 };

            cart.forEach((item, idx) => {
                totals.PKR += item.pkr; totals.USD += item.usd; totals.SAR += item.sar; totals.AED += item.aed;
                
                // Dashboard View
                const displayVal = item[activeCurrency.toLowerCase()].toLocaleString(undefined, { maximumFractionDigits: activeCurrency === 'PKR' ? 0 : 2 });
                list.innerHTML += `
                    <div class="quote-item">
                        <div class="item-main">
                            <h4>${item.name}</h4>
                            <p>UNITS: ${item.qty}</p>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <span class="item-price">${activeCurrency} ${displayVal}</span>
                            <button class="btn-remove" onclick="cart.splice(${idx},1);render()">×</button>
                        </div>
                    </div>`;

                // Invoice View
                printBody.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.qty}</td>
                        <td>${Math.round(item.pkr).toLocaleString()}</td>
                        <td>${item.usd.toFixed(2)}</td>
                        <td>${item.sar.toFixed(2)}</td>
                        <td>${item.aed.toFixed(2)}</td>
                    </tr>`;
            });

            document.getElementById('print-grand-totals').innerHTML = `
                TOTALS: PKR ${Math.round(totals.PKR).toLocaleString()} | USD ${totals.USD.toFixed(2)} | SAR ${totals.SAR.toFixed(2)} | AED ${totals.AED.toFixed(2)}
            `;
            document.getElementById('inv-date').innerText = "Generated: " + new Date().toLocaleDateString();
        }

        // Background logic
        const f = document.getElementById('starField');
        for(let i=0; i<80; i++) {
            const s = document.createElement('div'); s.className = 'star';
            s.style.width = s.style.height = Math.random()*2+1+'px';
            s.style.top = Math.random()*100+'%'; s.style.left = Math.random()*100+'%';
            s.style.setProperty('--duration', Math.random()*3+2+'s');
            f.appendChild(s);
        }
    </script>
</body>
</html>
