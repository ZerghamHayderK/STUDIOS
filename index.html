<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayut Studios | Global Quote Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #37b36f;
            --bg-dark: #050505;
            --panel-bg: rgba(20, 20, 20, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* --- SCREEN UI --- */
        @media screen {
            body { background-color: var(--bg-dark); color: white; font-family: 'Montserrat', sans-serif; margin: 0; display: flex; min-height: 100vh; }
            .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
            .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: glisten var(--duration) infinite ease-in-out; }
            @keyframes glisten { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }

            .sidebar { width: 300px; background: var(--panel-bg); backdrop-filter: blur(25px); border-right: 1px solid var(--glass-border); padding: 30px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
            .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; gap: 25px; z-index: 5; }
            
            .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
            .logo-text { font-size: 2.2rem; font-weight: 900; color: var(--primary-green); margin: 0; letter-spacing: -1px; }
            
            .card { background: var(--panel-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
            label { font-size: 0.65rem; opacity: 0.5; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; }
            input, select { background: #000; border: 1px solid var(--glass-border); color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; font-family: inherit; }
            
            .builder-row { display: grid; grid-template-columns: 1.5fr 1.5fr 0.5fr 1fr; gap: 15px; align-items: flex-end; }
            .btn-add { background: var(--primary-green); color: black; border: none; padding: 15px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
            
            .cur-btn { border: 1px solid var(--glass-border); background: transparent; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 900; }
            .cur-btn.active { background: var(--primary-green); color: black; border-color: var(--primary-green); }

            .quote-item { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
            .btn-remove { background: #ff4b4b; color: white; border: none; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; }
            
            /* CRITICAL FIX: The invoice is hidden from view but stays in the DOM flow */
            #invoice-print-area { display: none; }
        }

        /* --- PRINTABLE PDF UI (The Magic Fix) --- */
        @media print {
            @page { size: A4 landscape; margin: 1cm; }
            /* Hide EVERYTHING on the screen */
            html, body, .sidebar, .main-content, .stars, button, .btn-remove { display: none !important; visibility: hidden !important; }
            
            /* Show ONLY the invoice */
            #invoice-print-area { 
                display: block !important; 
                visibility: visible !important; 
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                width: 100% !important;
                color: black !important;
                background: white !important;
            }
            
            .print-header { border-bottom: 4px solid #37b36f; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            th { text-align: left; background: #f0f0f0 !important; color: black !important; padding: 10px; border-bottom: 2px solid #37b36f; font-size: 10px; -webkit-print-color-adjust: exact; }
            td { padding: 10px; border-bottom: 1px solid #eee; font-size: 11px; color: black !important; }
            .total-box { margin-top: 30px; text-align: right; border-top: 2px solid black; padding-top: 15px; }
        }
    </style>
</head>
<body>
    <div class="stars" id="starField"></div>

    <aside class="sidebar">
        <h1 class="logo-text" style="font-size: 1.5rem; margin-bottom: 20px;">STUDIO</h1>
        <div>
            <label>CLIENT / PROJECT</label>
            <input type="text" id="projName" placeholder="Client Name..." oninput="render()">
        </div>
        <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 10px 0;">
        <div>
            <label>MARGIN (%)</label>
            <input type="number" id="marginInput" value="7" step="0.5" oninput="render()">
        </div>
        <div>
            <label>DISCOUNT (%)</label>
            <input type="number" id="discountInput" value="0" step="0.5" oninput="render()">
        </div>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1 class="logo-text">Bayut Studios</h1>
            <button onclick="window.print()" style="background: var(--primary-green); color:black; border:none; padding:12px 25px; border-radius:8px; font-weight:900; cursor:pointer;">DOWNLOAD PDF</button>
        </div>

        <div class="card">
            <div class="builder-row">
                <div>
                    <label>CATEGORY</label>
                    <select id="catSelect" onchange="updateProducts()"><option>Loading Data...</option></select>
                </div>
                <div>
                    <label>PRODUCT</label>
                    <select id="prodSelect"></select>
                </div>
                <div>
                    <label>QTY</label>
                    <input type="number" id="unitInput" value="1">
                </div>
                <button class="btn-add" onclick="addToQuote()">ADD TO SCOPE</button>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <label style="margin:0;">Project Summary</label>
                <div style="display: flex; gap: 5px;">
                    <button id="btn-PKR" class="cur-btn active" onclick="setCurrency('PKR')">PKR</button>
                    <button id="btn-USD" class="cur-btn" onclick="setCurrency('USD')">USD</button>
                    <button id="btn-SAR" class="cur-btn" onclick="setCurrency('SAR')">SAR</button>
                    <button id="btn-AED" class="cur-btn" onclick="setCurrency('AED')">AED</button>
                </div>
            </div>
            <div id="cartList"></div>
        </div>
    </main>

    <div id="invoice-print-area">
        <div class="print-header">
            <div>
                <h1 style="color:#37b36f; margin:0; font-family: Montserrat;">BAYUT STUDIOS</h1>
                <p style="font-size:10px; margin:5px 0;">STRATEGIC CREATIVE SOLUTIONS</p>
            </div>
            <div style="text-align: right;">
                <h3 id="print-proj-name" style="margin:0; text-transform: uppercase;">QUOTATION</h3>
                <small id="inv-date"></small>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Qty</th>
                    <th>PKR</th>
                    <th>USD</th>
                    <th>SAR</th>
                    <th>AED</th>
                </tr>
            </thead>
            <tbody id="print-rows"></tbody>
        </table>
        <div class="total-box">
            <div id="print-final-pkr" style="font-size: 20px; font-weight: 900;"></div>
            <div id="print-final-others" style="font-size: 11px; opacity: 0.7; margin-top: 5px;"></div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1qvBKlYH7q4dXsu7tEh9OLnKSydfONNRzGa-xjUYLB0g';
        const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        let db = [], cart = [], activeCur = 'PKR';

        function parseCell(cell) {
            if (!cell) return 0;
            let val = cell.f ? cell.f : String(cell.v);
            return parseFloat(val.replace(/[^0-9.]/g, '')) || 0;
        }

        fetch(DATA_URL).then(r => r.text()).then(t => {
            const data = JSON.parse(t.substr(47).slice(0, -2));
            db = data.table.rows.map(r => {
                const c = r.c;
                if(!c[0] || !c[1]) return null;
                return { cat: c[0].v, name: c[1].v, bQty: parseCell(c[2]) || 1, pkr: parseCell(c[4]), usd: parseCell(c[5]), sar: parseCell(c[6]), aed: parseCell(c[7]) };
            }).filter(x => x);
            
            const cats = [...new Set(db.map(i => i.cat))];
            document.getElementById('catSelect').innerHTML = '<option value="">Select Category</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
        });

        function updateProducts() {
            const cat = document.getElementById('catSelect').value;
            document.getElementById('prodSelect').innerHTML = db.filter(i => i.cat === cat).map(i => `<option value="${i.name}">${i.name}</option>`).join('');
        }

        function setCurrency(code) {
            activeCur = code;
            document.querySelectorAll('.cur-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + code).classList.add('active');
            render();
        }

        function addToQuote() {
            const name = document.getElementById('prodSelect').value;
            if(!name) return alert("Select a product");
            const qty = parseInt(document.getElementById('unitInput').value) || 1;
            const item = db.find(i => i.name === name);
            
            if(item) {
                cart.push({ 
                    name: item.name, 
                    qty: qty,
                    rawPKR: item.pkr / item.bQty,
                    rawUSD: item.usd / item.bQty,
                    rawSAR: item.sar / item.bQty,
                    rawAED: item.aed / item.bQty
                });
                render();
            }
        }

        function render() {
            const margin = parseFloat(document.getElementById('marginInput').value) || 0;
            const discount = parseFloat(document.getElementById('discountInput').value) || 0;
            const multi = ((1 + (margin / 100)) / 1.07) * (1 - (discount / 100));

            const list = document.getElementById('cartList');
            const printList = document.getElementById('print-rows');
            list.innerHTML = ''; printList.innerHTML = '';
            
            let sums = { pkr: 0, usd: 0, sar: 0, aed: 0 };
            if(cart.length === 0) { list.innerHTML = '<div style="opacity:0.2; text-align:center; padding: 20px;">No items added</div>'; return; }

            cart.forEach((item, idx) => {
                const p = item.rawPKR * multi * item.qty;
                const u = item.rawUSD * multi * item.qty;
                const s = item.rawSAR * multi * item.qty;
                const a = item.rawAED * multi * item.qty;
                
                sums.pkr += p; sums.usd += u; sums.sar += s; sums.aed += a;
                
                // Screen Item
                let currentTotal = (activeCur === 'PKR') ? Math.round(p).toLocaleString() : (activeCur === 'USD' ? u : (activeCur === 'SAR' ? s : a)).toFixed(2);
                
                list.innerHTML += `<div class="quote-item">
                    <div><b>${item.name}</b><br><small>Qty: ${item.qty}</small></div>
                    <div style="text-align:right; display:flex; align-items:center; gap:15px;">
                        <span style="font-weight:900;">${activeCur} ${currentTotal}</span>
                        <button class="btn-remove" onclick="cart.splice(${idx},1);render()">×</button>
                    </div>
                </div>`;

                // PDF Item
                printList.innerHTML += `<tr>
                    <td>${item.name}</td><td>${item.qty}</td>
                    <td>${Math.round(p).toLocaleString()}</td>
                    <td>${u.toFixed(2)}</td>
                    <td>${s.toFixed(2)}</td>
                    <td>${a.toFixed(2)}</td>
                </tr>`;
            });

            document.getElementById('print-final-pkr').innerText = `GRAND TOTAL: PKR ${Math.round(sums.pkr).toLocaleString()}`;
            document.getElementById('print-final-others').innerText = `USD ${sums.usd.toFixed(2)} | SAR ${sums.sar.toFixed(2)} | AED ${sums.aed.toFixed(2)}`;
            document.getElementById('inv-date').innerText = "Generated: " + new Date().toLocaleDateString();
            document.getElementById('print-proj-name').innerText = document.getElementById('projName').value || "OFFICIAL QUOTATION";
        }

        // Background Stars
        const f = document.getElementById('starField');
        for(let i=0; i<80; i++) {
            const s = document.createElement('div'); s.className = 'star';
            s.style.width = s.style.height = Math.random()*2+1+'px';
            s.style.top = Math.random()*100+'%'; s.style.left = Math.random()*100+'%';
            s.style.setProperty('--duration', Math.random()*3+2+'s');
            f.appendChild(s);
        }
    </script>
</body>
</html>
