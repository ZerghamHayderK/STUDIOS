<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayut Studios | Global Quote Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #37b36f;
            --bg-dark: #050505;
            --panel-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* --- DASHBOARD UI --- */
        @media screen {
            body { background-color: var(--bg-dark); color: white; font-family: 'Montserrat', sans-serif; margin: 0; display: flex; min-height: 100vh; overflow-x: hidden; }
            .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
            .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: glisten var(--duration) infinite ease-in-out; }
            @keyframes glisten { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.2); } }

            .sidebar { width: 300px; background: var(--panel-bg); backdrop-filter: blur(25px); border-right: 1px solid var(--glass-border); padding: 30px; display: flex; flex-direction: column; gap: 25px; }
            .section-title { color: var(--primary-green); font-size: 0.8rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
            
            .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
            label { font-size: 0.7rem; opacity: 0.6; font-weight: 700; text-transform: uppercase; }
            input, select { background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: white; padding: 12px; border-radius: 8px; font-family: inherit; font-size: 0.9rem; }
            
            .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; gap: 30px; }
            .header { display: flex; justify-content: space-between; align-items: center; }
            .logo-text { font-size: 2.2rem; font-weight: 900; color: var(--primary-green); margin: 0; text-transform: uppercase; }
            
            .card { background: var(--panel-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px; }
            .builder-row { display: grid; grid-template-columns: 1.5fr 1.5fr 0.5fr 1fr; gap: 15px; align-items: flex-end; }
            .btn-add { background: var(--primary-green); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
            
            .cur-btn { border: 1px solid var(--glass-border); background: transparent; color: white; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 900; }
            .cur-btn.active { background: var(--primary-green); border-color: var(--primary-green); color: black; }

            .quote-item { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 20px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
            .btn-remove { background: #ff4b4b; color: white; border: none; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; }
            
            #invoice-print-area { display: none; }
        }

        /* --- PRINTABLE PDF UI --- */
        @media print {
            @page { size: A4 landscape; margin: 1cm; }
            body * { display: none !important; }
            #invoice-print-area { display: block !important; background: white !important; color: black !important; padding: 20px; }
            .print-header { border-bottom: 5px solid #37b36f; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; }
            table { width: 100%; border-collapse: collapse; }
            th { background: #f5f5f5; padding: 10px; border-bottom: 2px solid #37b36f; font-size: 10px; text-align: left; }
            td { padding: 10px; border-bottom: 1px solid #eee; font-size: 11px; }
            .total-table { margin-top: 30px; float: right; width: 300px; font-weight: 900; font-size: 14px; text-align: right; }
        }
    </style>
</head>
<body>
    <div class="stars" id="starField"></div>

    <aside class="sidebar">
        <div class="section-title">Project Info</div>
        <div class="input-group">
            <label>CLIENT / PROJECT NAME</label>
            <input type="text" id="projName" placeholder="Enter name...">
        </div>

        <div class="section-title">Variables</div>
        <div class="input-group">
            <label>MARGIN (%)</label>
            <input type="number" id="marginInput" value="7" step="0.5">
        </div>
        <div class="input-group">
            <label>DISCOUNT (%)</label>
            <input type="number" id="discountInput" value="0" step="0.5">
        </div>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1 class="logo-text">Bayut Studios</h1>
            <button onclick="generatePDF()" style="background: var(--primary-green); color:white; border:none; padding:15px 30px; border-radius:10px; font-weight:900; cursor:pointer;">DOWNLOAD PDF QUOTE</button>
        </div>

        <div class="card">
            <div class="section-title">Add Service</div>
            <div class="builder-row">
                <div class="input-group">
                    <label>CATEGORY</label>
                    <select id="catSelect" onchange="updateProducts()"><option>Loading...</option></select>
                </div>
                <div class="input-group">
                    <label>SERVICE PRODUCT</label>
                    <select id="prodSelect"></select>
                </div>
                <div class="input-group">
                    <label>QTY</label>
                    <input type="number" id="unitInput" value="1" min="1">
                </div>
                <button class="btn-add" onclick="addToQuote()">Add to Project</button>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div class="section-title">Project Scope</div>
                <div style="display: flex; gap: 5px;">
                    <button class="cur-btn active" onclick="setCurrency('PKR', this)">PKR</button>
                    <button class="cur-btn" onclick="setCurrency('USD', this)">USD</button>
                    <button class="cur-btn" onclick="setCurrency('SAR', this)">SAR</button>
                    <button class="cur-btn" onclick="setCurrency('AED', this)">AED</button>
                </div>
            </div>
            <div id="cartList"></div>
        </div>
    </main>

    <div id="invoice-print-area">
        <div class="print-header">
            <div>
                <h1 style="color:#37b36f; margin:0;">BAYUT STUDIOS</h1>
                <p style="font-size:10px; margin:5px 0;">STRATEGIC CREATIVE SOLUTIONS</p>
            </div>
            <div style="text-align: right;">
                <h3 id="print-proj-name" style="margin:0;">OFFICIAL QUOTATION</h3>
                <p id="inv-date" style="font-size:10px;"></p>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th width="30%">Description</th>
                    <th>Qty</th>
                    <th>PKR Total</th>
                    <th>USD Total</th>
                    <th>SAR Total</th>
                    <th>AED Total</th>
                </tr>
            </thead>
            <tbody id="print-rows"></tbody>
        </table>
        <div class="total-table">
            <div style="border-bottom: 1px solid #37b36f; padding: 10px 0;">GRAND TOTALS</div>
            <div id="print-final-pkr" style="font-size: 20px; padding: 10px 0;"></div>
            <div id="print-final-others" style="font-size: 11px; opacity: 0.7;"></div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1qvBKlYH7q4dXsu7tEh9OLnKSydfONNRzGa-xjUYLB0g';
        const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        let db = [], cart = [], activeCur = 'PKR';

        function parseCell(cell) {
            if (!cell) return 0;
            let val = cell.f ? cell.f : String(cell.v);
            return parseFloat(val.replace(/[^0-9.]/g, '')) || 0;
        }

        fetch(DATA_URL).then(r => r.text()).then(t => {
            const data = JSON.parse(t.substr(47).slice(0, -2));
            db = data.table.rows.map(r => {
                const c = r.c;
                return c[0] && c[1] ? { cat: c[0].v, name: c[1].v, bQty: parseCell(c[2]) || 1, pkr: parseCell(c[4]), usd: parseCell(c[5]), sar: parseCell(c[6]), aed: parseCell(c[7]) } : null;
            }).filter(x => x);
            
            const cats = [...new Set(db.map(i => i.cat))];
            document.getElementById('catSelect').innerHTML = '<option value="">Select Category</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
        });

        function updateProducts() {
            const cat = document.getElementById('catSelect').value;
            document.getElementById('prodSelect').innerHTML = db.filter(i => i.cat === cat).map(i => `<option value="${i.name}">${i.name}</option>`).join('');
        }

        function setCurrency(code, btn) {
            activeCur = code;
            document.querySelectorAll('.cur-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function addToQuote() {
            const name = document.getElementById('prodSelect').value;
            const qty = parseInt(document.getElementById('unitInput').value) || 1;
            const margin = parseFloat(document.getElementById('marginInput').value) || 0;
            const discount = parseFloat(document.getElementById('discountInput').value) || 0;
            const item = db.find(i => i.name === name);
            
            if(item) {
                const multi = ((1 + (margin / 100)) / 1.07) * (1 - (discount / 100));
                cart.push({ name, qty, 
                    pkr: (item.pkr / item.bQty) * multi * qty,
                    usd: (item.usd / item.bQty) * multi * qty,
                    sar: (item.sar / item.bQty) * multi * qty,
                    aed: (item.aed / item.bQty) * multi * qty
                });
                render();
            }
        }

        function render() {
            const list = document.getElementById('cartList');
            const printList = document.getElementById('print-rows');
            list.innerHTML = ''; printList.innerHTML = '';
            
            let sums = { pkr: 0, usd: 0, sar: 0, aed: 0 };

            cart.forEach((item, idx) => {
                sums.pkr += item.pkr; sums.usd += item.usd; sums.sar += item.sar; sums.aed += item.aed;
                
                // Screen UI
                const displayVal = activeCur === 'PKR' ? Math.round(item.pkr).toLocaleString() : item[activeCur.toLowerCase()].toFixed(2);
                list.innerHTML += `<div class="quote-item">
                    <div><b>${item.name}</b><br><small>Qty: ${item.qty}</small></div>
                    <div style="text-align:right;">
                        <span style="font-weight:900; font-family:Inter;">${activeCur} ${displayVal}</span>
                        <button class="btn-remove" onclick="cart.splice(${idx},1);render()">×</button>
                    </div>
                </div>`;

                // PDF Rows
                printList.innerHTML += `<tr>
                    <td>${item.name}</td><td>${item.qty}</td>
                    <td>${Math.round(item.pkr).toLocaleString()}</td>
                    <td>${item.usd.toFixed(2)}</td>
                    <td>${item.sar.toFixed(2)}</td>
                    <td>${item.aed.toFixed(2)}</td>
                </tr>`;
            });

            // Update PDF Totals
            document.getElementById('print-final-pkr').innerText = `PKR ${Math.round(sums.pkr).toLocaleString()}`;
            document.getElementById('print-final-others').innerText = `USD: ${sums.usd.toFixed(2)} | SAR: ${sums.sar.toFixed(2)} | AED: ${sums.aed.toFixed(2)}`;
            document.getElementById('inv-date').innerText = "Generated: " + new Date().toLocaleDateString();
            document.getElementById('print-proj-name').innerText = document.getElementById('projName').value || "OFFICIAL QUOTATION";
        }

        function generatePDF() {
            if(cart.length === 0) return alert("Please add services first.");
            render(); // Refresh one last time
            window.print();
        }

        const f = document.getElementById('starField');
        for(let i=0; i<80; i++) {
            const s = document.createElement('div'); s.className = 'star';
            s.style.width = s.style.height = Math.random()*2+1+'px';
            s.style.top = Math.random()*100+'%'; s.style.left = Math.random()*100+'%';
            s.style.setProperty('--duration', Math.random()*3+2+'s');
            f.appendChild(s);
        }
    </script>
</body>
</html>
